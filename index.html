<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kamalgonj Protidin</title>
<style>
body{font-family:Arial,sans-serif;margin:0;background:#f5f5f5}
header{background:#c62828;color:#fff;text-align:center;padding:15px}
.breaking{background:#111;color:#fff;padding:8px;overflow:hidden;white-space:nowrap}
.breaking span{display:inline-block;padding-left:100%;animation:marquee 20s linear infinite}
@keyframes marquee{from{transform:translateX(0)}to{transform:translateX(-100%)}}
.controls{padding:10px;display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.controls input,.controls select{padding:8px}
#slider{display:flex;overflow-x:auto;gap:12px;padding:12px}
.slide{min-width:320px;background:#fff3cd;border:2px solid gold;border-radius:8px;padding:10px}
.slide img{width:100%}
#news-container{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:20px;padding:20px}
.news{background:white;border-radius:8px;overflow:hidden;box-shadow:0 2px 6px rgba(0,0,0,.1)}
.news img{width:100%}
.news h2,.news p{padding:0 10px}
.meta{padding:10px;color:#666;font-size:.9em}
</style>
</head>
<body>
<header><h1>Kamalgonj Protidin</h1></header>

<div class="breaking"><span id="breakingText">Loading breaking news...</span></div>

<div class="controls">
<input id="search" placeholder="Search news">
<select id="category"><option value="all">All Categories</option></select>
</div>

<div id="slider"></div>
<div id="news-container"></div>

<script src="https://cdn.jsdelivr.net/npm/tabletop@1.6.0/tabletop.min.js"></script>
<script>
const publicSheetUrl="https://docs.google.com/spreadsheets/d/e/2PACX-1vTgpH3CTpa4PlF3ggiaObN_YiLHjWHpNhFFTatbeeZiDz7EO19JJzBqBIUq919SNVjeAwyZYHaFMwGg/pubhtml";
let newsData=[];

Tabletop.init({
 key:publicSheetUrl,
 simpleSheet:true,
 callback:function(data){
   newsData=data;
   populateCategories();
   render(data);
   renderSlider();
   renderBreaking();
 }
});

function populateCategories(){
 const cats=[...new Set(newsData.map(x=>x.Category).filter(Boolean))];
 const sel=document.getElementById("category");
 cats.forEach(c=>{
  let o=document.createElement("option");
  o.value=c;o.textContent=c;
  sel.appendChild(o);
 });
}

function renderBreaking(){
 const titles=newsData.slice(0,5).map(x=>x.Title).join(" ♦ ");
 document.getElementById("breakingText").textContent=titles || "Latest News";
}

function renderSlider(){
 const featured=newsData.filter(x=>(x.Featured||"").toLowerCase()=="yes");
 document.getElementById("slider").innerHTML=featured.map(n=>`
 <div class="slide">
 <img src="${n['Image URL']||''}">
 <h3>${n.Title||''}</h3>
 </div>`).join("");
}

function render(items){
 document.getElementById("news-container").innerHTML=items.map(n=>`
 <div class="news">
 <img src="${n['Image URL']||''}">
 <h2>${n.Title||''}</h2>
 <p>${n['News Content']||''}</p>
 <div class="meta">${n.Category||''} | ${n.Date||''}</div>
 </div>`).join("");
}

function filter(){
 const q=document.getElementById("search").value.toLowerCase();
 const c=document.getElementById("category").value;
 const f=newsData.filter(n=>{
  const t=(n.Title||"").toLowerCase();
  const b=(n['News Content']||"").toLowerCase();
  return (t.includes(q)||b.includes(q)) && (c=="all"||n.Category==c);
 });
 render(f);
}

document.addEventListener("input",e=>{if(e.target.id=="search")filter();});
document.getElementById("category").addEventListener("change",filter);
</script>
</body>
</html>
