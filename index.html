<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>কমলগঞ্জ প্রতিদিন</title>
<style>
body{margin:0;font-family:Arial,sans-serif;background:#f5f5f5}
.top-header{text-align:center;background:#fff;padding:10px}
.logo{max-width:220px}
.headline-banner{background:#d50000;color:#fff;padding:10px;font-weight:bold}
.nav-menu{display:flex;flex-wrap:wrap;justify-content:center;background:#222}
.nav-menu a{color:white;text-decoration:none;padding:12px;cursor:pointer}
.nav-menu a.active{background:#444}
.ticker{background:#ffeb3b;padding:10px;font-weight:bold}
.card,.featured-news{background:#fff;margin:10px;padding:10px;border-radius:8px;box-shadow:0 1px 5px rgba(0,0,0,.1)}
.featured-img,.news-image{width:100%;border-radius:8px}
footer{background:#222;color:white;text-align:center;padding:15px;margin-top:20px}
</style>
</head>
<body>

<header class="top-header">
<img src="logo.jpg" alt="কমলগঞ্জ প্রতিদিন" class="logo">
<div class="headline-banner">কামালগঞ্জ উপজেলার সর্বশেষ স্থানীয় সংবাদ</div>
</header>

<nav class="nav-menu">
<a onclick="filterNews('all')" class="active">হোম</a>
<a onclick="filterNews('জাতীয়')">জাতীয়</a>
<a onclick="filterNews('রাজনীতি')">রাজনীতি</a>
<a onclick="filterNews('স্থানীয়')">স্থানীয়</a>
<a onclick="filterNews('খেলাধুলা')">খেলাধুলা</a>
<a onclick="filterNews('বিনোদন')">বিনোদন</a>
</nav>

<div class="ticker"><span id="breaking">লোড হচ্ছে...</span></div>
<section id="featured-news" class="featured-news"><p>প্রধান সংবাদ লোড হচ্ছে...</p></section>
<h2 style="padding:10px">সর্বশেষ সংবাদ</h2>
<div id="news-container"></div>

<footer><p>© Kamalgonj Protidin</p></footer>

<script>
let allNews=[];

function formatBDTime(dateStr){
 try{
   const d = new Date(dateStr);
   if(isNaN(d)) return dateStr || '';
   return d.toLocaleString('bn-BD', {
     timeZone:'Asia/Dhaka',
     year:'numeric',
     month:'long',
     day:'numeric',
     hour:'numeric',
     minute:'2-digit'
   });
 }catch(e){
   return dateStr || '';
 }
}


function renderNews(items){
 let html='';
 items.forEach(item=>{
   html += `<div class="card">
      <img src="${item['Image URL']||''}" class="news-image">
      <h3>${item.Title||''}</h3>
      <p><b>${item.Category||''}</b> | ${formatBDTime(item.Date)}</p>
      <p>${item['News Content']||''}</p>
   </div>`;
 });
 document.getElementById('news-container').innerHTML = html || '<p style="padding:10px">কোন সংবাদ পাওয়া যায়নি।</p>';
}

function filterNews(category){
 document.querySelectorAll('.nav-menu a').forEach(a=>a.classList.remove('active'));
 if(event && event.target) event.target.classList.add('active');
 if(category==='all'){ renderNews(allNews); return; }
 renderNews(allNews.filter(n => String(n.Category||'').trim()===category));
}

document.getElementById('breaking').textContent='কমলগঞ্জ উপজেলার সর্বশেষ গুরুত্বপূর্ণ সংবাদ এখানে দেখুন।';

const SHEET_URL='https://script.google.com/macros/s/AKfycbz_ysTtXX6XjtLY2NgqvECQcPlls4ndzuNu_IhbjWQbYRnlnTxXV98M72vyLA8pE8So8Q/exec';

fetch(SHEET_URL)
.then(r=>r.json())
.then(news=>{
 allNews=[...news].reverse();

 const featured=news.find(i=>String(i.Featured).toLowerCase()==='yes');
 if(featured){
   document.getElementById('featured-news').innerHTML =
   `<img src="${featured['Image URL']}" class="featured-img">
    <h2>${featured.Title}</h2>
    <p>${featured['News Content']}</p>`;
 }

 renderNews(allNews);
})
.catch(err=>{
 document.getElementById('news-container').innerHTML='<p style="padding:10px">সংবাদ লোড করা যায়নি।</p>';
});
</script>
</body>
</html>
